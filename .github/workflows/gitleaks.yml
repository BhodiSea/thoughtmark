# Secret scanning local mirror (row 21) — complements GitHub-native secret scanning + push protection
# (the authoritative control, enabled on the repo). Pinned gitleaks binary for reliability. SHA-pinned actions.
name: gitleaks
on:
  push: {}
  pull_request: {}
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.28.0
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install and run gitleaks
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
