# CI is authoritative — this is the wall `just ci` mirrors (row 17). Every third-party `uses:` is pinned to a
# full commit SHA before this goes live: run `pinact run .github/workflows/*.yml` (BOOTSTRAP.md). Until then the
# `@vX` tags are placeholders that `pinact`/`zizmor` will flag.
name: ci
on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: ["1.96.0", stable]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny,cargo-audit
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo nextest run --all-features --locked
      - run: cargo deny check
      - run: cargo audit
      - run: ./scripts/check-dep-direction.sh
      - run: cargo build -p thoughtmark-core --target wasm32-unknown-unknown --no-default-features --features alloc --locked
      - run: ./scripts/assert-no-getrandom-wasmbindgen.sh

  conformance:
    # THE single most load-bearing control (row 10): Rust ⟷ WASM/TS byte-equality over spec/vectors.
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,wasm-pack
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: cargo nextest run -p thoughtmark-testkit --test conformance --locked
      - run: wasm-pack build crates/thoughtmark-wasm --target web --out-dir ../../packages/core/wasm --out-name thoughtmark_wasm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @thoughtmark/core build
      - run: pnpm --filter @thoughtmark/core test:conformance

  ts-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: wasm-pack build crates/thoughtmark-wasm --target web --out-dir ../../packages/core/wasm --out-name thoughtmark_wasm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @thoughtmark/core build
      - run: pnpm -r --if-present typecheck
      - run: pnpm biome check .
      - run: pnpm --filter @thoughtmark/core test:wasm   # wasm-bindgen-test: Node + headless browser (CI has WebDrivers)
      - run: pnpm --filter @thoughtmark/core publint
      - run: pnpm --filter @thoughtmark/core attw
      - run: pnpm knip

  docs-licensing:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - run: pipx install reuse
      - run: reuse lint
      - run: ./scripts/spec-traceability.sh

  actions-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: zizmor
      - run: zizmor .github/workflows
      - uses: rhysd/actionlint@main
