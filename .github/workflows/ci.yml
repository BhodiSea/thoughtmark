# CI is authoritative — this is the wall `just ci` mirrors (row 17). Every third-party `uses:` is pinned to a
# full commit SHA before this goes live: run `pinact run .github/workflows/*.yml` (BOOTSTRAP.md). Until then the
# `@vX` tags are placeholders that `pinact`/`zizmor` will flag.
name: ci
on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: ["1.96.0", stable]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest,cargo-deny,cargo-audit
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo nextest run --all-features --locked
      - run: cargo deny check
      - run: cargo audit
      - run: ./scripts/check-dep-direction.sh
      - run: cargo build -p thoughtmark-core --target wasm32-unknown-unknown --no-default-features --features alloc --locked
      - run: ./scripts/assert-no-getrandom-wasmbindgen.sh

  conformance:
    # THE single most load-bearing control (row 10): Rust ⟷ WASM/TS byte-equality over spec/vectors.
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest,wasm-pack
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: cargo nextest run -p thoughtmark-testkit --test conformance --locked
      - run: wasm-pack build crates/thoughtmark-wasm --target web --out-dir ../../packages/core/wasm --out-name thoughtmark_wasm
      - run: CI=true ./scripts/assert-wasm-blake3.sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @thoughtmark/core build
      - run: pnpm --filter @thoughtmark/core test:conformance

  ts-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: wasm-pack
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: wasm-pack build crates/thoughtmark-wasm --target web --out-dir ../../packages/core/wasm --out-name thoughtmark_wasm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @thoughtmark/core build
      - run: pnpm -r --if-present typecheck
      - run: pnpm biome check .
      - run: pnpm --filter @thoughtmark/core test:wasm # wasm-bindgen-test: Node + headless browser (CI has WebDrivers)
      - run: pnpm --filter @thoughtmark/core publint
      - run: pnpm --filter @thoughtmark/core attw
      - run: pnpm knip

  docs-licensing:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - run: pipx install reuse
      - run: reuse lint
      - run: ./scripts/spec-traceability.sh

  actions-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: zizmor
      - run: zizmor .github/workflows
      - name: actionlint
        run: bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) && ./actionlint -color

  release-train-consistency:
    # Refuses a PR that MUTATES or DELETES an existing spec/vectors expected byte without a MAJOR corpus bump + a
    # new format-identifier value (arch §13.4 / §16). Needs full history to diff against origin/main.
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0 # the script diffs the working tree against origin/main
      - run: ./scripts/release-train-consistency.sh origin/main

  manifest-toolchain:
    # Asserts spec/vectors/manifest.json's `toolchain` block == the live pinned tools, and that wasm_opt stays
    # disabled (arch §12.5 / §16). GitHub Actions sets CI=true, so assert-manifest-toolchain.sh ENFORCES here
    # (locally it only warns, keeping `just ci` green off the pinned host).
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: wasm-bindgen-cli@0.2.125 # the script compares `wasm-bindgen --version` to the manifest pin
      - run: ./scripts/assert-manifest-toolchain.sh
