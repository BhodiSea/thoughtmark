# Release provenance (qf Domain 7) — wired for the Phase 3 1.0 freeze; runs only on tags. SBOMs, build
# attestations, and OIDC trusted publishing (crates.io + npm --provenance, no long-lived tokens).
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  provenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      SOURCE_DATE_EPOCH: "1750000000"
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96.0"
      - run: cargo build --release --locked
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: target/release/tm
