# Release provenance (qf Domain 7) — wired for the Phase 3 1.0 freeze; runs only on tags. SBOMs, build
# attestations, and OIDC trusted publishing (crates.io + npm --provenance, no long-lived tokens).
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  provenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      SOURCE_DATE_EPOCH: "1750000000"
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - run: cargo build --release --locked
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - run: cargo cyclonedx --format json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/tm
