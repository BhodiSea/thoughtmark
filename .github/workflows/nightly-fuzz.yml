# Dedicated nightly fuzz job (ADR-0006): cargo-fuzz pins a dated nightly, OUTSIDE the 1.96.0 stable workspace.
# Targets activate per-parser as that parser lands (jcs/cid in Phase 1).
name: nightly-fuzz
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-fuzz
      - name: Smoke fuzz targets briefly
        working-directory: fuzz
        run: |
          for t in jcs cid; do
            cargo +nightly fuzz run "$t" -- -runs=20000 -max_total_time=120 || true
          done
